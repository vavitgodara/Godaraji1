<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avengers Initiative - Hero Selector</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Audiowide&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #0a0e27; }
        
        @keyframes slideInRight {
            from { opacity: 0; transform: translateY(-50%) translateX(50px); }
            to { opacity: 1; transform: translateY(-50%) translateX(0); }
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const AvengersApp = () => {
            const [currentHero, setCurrentHero] = useState(0);
            const [isAudioPlaying, setIsAudioPlaying] = useState(false);
            const audioRef = useRef(null);
            const mountRef = useRef(null);
            const sceneRef = useRef(null);
            const rendererRef = useRef(null);
            const modelRef = useRef(null);

            const heroes = [
                { name: "Iron Man", alias: "Tony Stark", color: "#FF6B35", description: "Genius, billionaire, philanthropist", power: "Technology & Intelligence", symbol: "⚙️", audioUrl: "acp.mp3" },
                { name: "Captain America", alias: "Steve Rogers", color: "#003DA5", description: "The First Avenger", power: "Strength & Leadership", symbol: "🛡️", audioUrl: "acp2.mp3" },
                { name: "Thor", alias: "God of Thunder", color: "#FFD700", description: "Prince of Asgard", power: "Thunder & Lightning", symbol: "⚡", audioUrl: "" },
                { name: "Black Widow", alias: "Natasha Romanoff", color: "#2A2A2A", description: "Master Spy & Assassin", power: "Combat & Espionage", symbol: "🕷️", audioUrl: "acp3.mp3" },
                { name: "Hulk", alias: "Bruce Banner", color: "#2D5016", description: "The Incredible Hulk", power: "Strength & Rage", symbol: "💪", audioUrl: "" },
                { name: "Hawkeye", alias: "Clint Barton", color: "#8B0000", description: "Master Archer", power: "Precision & Accuracy", symbol: "🏹", audioUrl: "" }
            ];

            const handleAudioToggle = () => {
                if (!audioRef.current || !heroes[currentHero].audioUrl) return;
                if (isAudioPlaying) {
                    audioRef.current.pause();
                } else {
                    audioRef.current.play().catch(e => console.log("Audio play failed: ", e));
                }
                setIsAudioPlaying(!isAudioPlaying);
            };

            const handleAudioEnded = () => setIsAudioPlaying(false);

            const createHeroModel = (index) => {
                if (!sceneRef.current) return;
                const hero = heroes[index];
                if (modelRef.current) sceneRef.current.remove(modelRef.current);

                const group = new THREE.Group();
                const geometry = new THREE.IcosahedronGeometry(1, 4);
                const colorHex = parseInt(hero.color.replace('#', '0x'));
                
                const material = new THREE.MeshPhongMaterial({
                    color: colorHex,
                    emissive: colorHex,
                    emissiveIntensity: 0.3,
                    shininess: 100
                });

                const mesh = new THREE.Mesh(geometry, material);
                group.add(mesh);

                for (let i = 0; i < 3; i++) {
                    const ringGeometry = new THREE.TorusGeometry(1.5 + i * 0.5, 0.05, 16, 100);
                    const ringMaterial = new THREE.MeshBasicMaterial({
                        color: colorHex,
                        transparent: true,
                        opacity: 0.6 - i * 0.15
                    });
                    const ring = new THREE.Mesh(ringGeometry, ringMaterial);
                    ring.rotation.x = Math.random() * Math.PI;
                    ring.rotation.y = Math.random() * Math.PI;
                    group.add(ring);
                }

                group.userData = { startTime: Date.now() };
                sceneRef.current.add(group);
                modelRef.current = group;
            };

            useEffect(() => {
                const scene = new THREE.Scene();
                sceneRef.current = scene;
                scene.background = new THREE.Color(0x0a0e27);
                
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.z = 5;

                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                mountRef.current.appendChild(renderer.domElement);
                rendererRef.current = renderer;

                const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
                scene.add(ambientLight);

                const pointLight = new THREE.PointLight(0xffffff, 1);
                pointLight.position.set(5, 5, 5);
                scene.add(pointLight);

                createHeroModel(0);

                const animate = () => {
                    requestAnimationFrame(animate);
                    if (modelRef.current) {
                        modelRef.current.rotation.y += 0.01;
                        const elapsed = (Date.now() - modelRef.current.userData.startTime) * 0.001;
                        modelRef.current.position.y = Math.sin(elapsed) * 0.2;
                    }
                    renderer.render(scene, camera);
                };
                animate();

                const handleResize = () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                };
                window.addEventListener('resize', handleResize);

                return () => window.removeEventListener('resize', handleResize);
            }, []);

            useEffect(() => {
                createHeroModel(currentHero);
                if (audioRef.current) {
                    audioRef.current.pause();
                    setIsAudioPlaying(false);
                }
            }, [currentHero]);

            const styles = {
                container: { width: '100%', height: '100vh', fontFamily: "'Orbitron', sans-serif", color: 'white', position: 'relative' },
                navContainer: { position: 'absolute', bottom: 50, left: '50%', transform: 'translateX(-50%)', display: 'flex', gap: '20px', zIndex: 10 },
                navBtn: { background: 'rgba(255,255,255,0.1)', border: '1px solid white', color: 'white', padding: '10px 20px', cursor: 'pointer' },
                heroPanel: { position: 'absolute', top: '50%', right: '5%', transform: 'translateY(-50%)', width: '320px', padding: '30px', background: 'rgba(10,14,39,0.8)', border: '2px solid', borderRadius: '10px', backdropFilter: 'blur(10px)', animation: 'slideInRight 0.5s ease-out' },
                counter: { position: 'absolute', top: 30, right: 30, fontSize: '24px', opacity: 0.5 }
            };

            return (
                <div style={styles.container}>
                    <div ref={mountRef} style={{width: '100%', height: '100%'}} />
                    
                    <audio ref={audioRef} src={heroes[currentHero].audioUrl} onEnded={handleAudioEnded} />

                    <div style={styles.counter}>{currentHero + 1} / {heroes.length}</div>

                    <div style={{...styles.heroPanel, borderColor: heroes[currentHero].color}}>
                        <div style={{fontSize: '40px', animation: 'float 3s infinite'}}>{heroes[currentHero].symbol}</div>
                        <h1 style={{color: heroes[currentHero].color, margin: '10px 0'}}>{heroes[currentHero].name}</h1>
                        <p style={{fontStyle: 'italic', marginBottom: '15px'}}>{heroes[currentHero].alias}</p>
                        <p style={{fontSize: '14px', lineHeight: '1.5'}}>{heroes[currentHero].description}</p>
                        <button 
                            onClick={handleAudioToggle} 
                            style={{marginTop: '20px', width: '100%', padding: '10px', background: isAudioPlaying ? heroes[currentHero].color : 'transparent', border: `1px solid ${heroes[currentHero].color}`, color: 'white', cursor: 'pointer'}}
                        >
                            {isAudioPlaying ? 'PAUSE' : 'PLAY AUDIO'}
                        </button>
                    </div>

                    <div style={styles.navContainer}>
                        <button style={styles.navBtn} onClick={() => setCurrentHero(prev => Math.max(0, prev - 1))}>PREV</button>
                        <button style={styles.navBtn} onClick={() => setCurrentHero(prev => Math.min(heroes.length - 1, prev + 1))}>NEXT</button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AvengersApp />);
    </script>
</body>
  </html>
